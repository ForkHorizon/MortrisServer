name: Web Quality Gate

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

concurrency:
  group: web-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality-gate:
    uses: ForkHorizon/ci-gates/.github/workflows/web-quality.yml@main
    with:
      runs-on: '["self-hosted", "macOS", "ARM64", "ci-scope"]'
      duplication-threshold: "2"
