name: Linter Checker 300 Lines

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      mode:
        description: Files to scan
        required: false
        default: all
        type: choice
        options:
          - all
          - changed
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-scope-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readability:
    uses: ForkHorizon/ci-gates/.github/workflows/readability.yml@main
    with:
      mode: ${{ inputs.mode || 'auto' }}
      config: .linter-checker-300-lines.json
      runs-on: '["self-hosted", "macOS", "ARM64", "ci-scope"]'
