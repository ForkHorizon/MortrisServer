name: Slop Review

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: slop-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slop-review:
    uses: ForkHorizon/ci-gates/.github/workflows/slop-review.yml@main
    with:
      runs-on: '["self-hosted", "macOS", "ARM64", "ci-scope"]'
