# -> /etc/systemd/journald.conf.d/mortris-cap.conf on the production VPS.
# Box-wide (affects every service's journal, not just Mortris's) — there
# was no explicit cap before, just systemd's implicit default. Matches
# section 13.1's "bounded, rotating log retention" intent without Docker's
# logging driver, since this box runs everything natively.
[Journal]
SystemMaxUse=500M
MaxRetentionSec=90day
