# /etc/nginx/sites-available/mortris on the production VPS (symlinked from
# sites-enabled/). This is the pre-certbot HTTP-only version — certbot
# --nginx --expand rewrites this file in place to add the 443/ssl server
# block and an 80->443 redirect (see the shared cert gotcha in the
# ForkHorizon repo's root CLAUDE.md: all hostnames on this cert must be
# passed to certbot in one invocation, never per-domain). Re-sync this
# file from the live VPS after that runs.

server {
    listen 80;
    listen [::]:80;
    server_name mortris.forkhorizon.com;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
