# /etc/nginx/sites-available/mortris on the production VPS (symlinked from
# sites-enabled/). Live snapshot as of 2026-07-17, after certbot --nginx
# --expand added mortris.forkhorizon.com to the shared forkhorizon.com
# cert (see the shared-cert gotcha in the ForkHorizon repo's root
# CLAUDE.md — always pass all hostnames in one certbot invocation, never
# per-domain). Re-sync this file from the live VPS if it changes again.

server {
    server_name mortris.forkhorizon.com;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/forkhorizon.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/forkhorizon.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = mortris.forkhorizon.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name mortris.forkhorizon.com;
    return 404; # managed by Certbot
}
