# /etc/pgbackrest/pgbackrest.conf on the production VPS. Local repo only —
# deploy/backup/sync-to-drive.sh mirrors repo1-path to Google Drive
# separately (pgBackRest has no native Google Drive repo type).
#
# Retention maps onto the plan's "7 daily, 4 weekly, 6 monthly recovery
# points" (section 13.3) as: monthly full (repo1-retention-full=6 ~= 6
# months), weekly differential (repo1-retention-diff=4 ~= 4 weeks), and
# continuous WAL archiving giving point-in-time recovery to any moment
# within the retained window — strictly finer-grained than 7 fixed daily
# snapshots, which is why there's no separate daily full/diff schedule
# here (see deploy/backup/README.md for the full mapping rationale).

[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=6
repo1-retention-diff=4
start-fast=y
process-max=2
log-level-console=info

[mortris]
pg1-path=/var/lib/postgresql/18/main
pg1-port=5432
